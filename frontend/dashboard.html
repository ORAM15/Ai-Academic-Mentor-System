<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Virtual Mentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: '#0a0a0a',
                        purpleDark: '#110a1f',
                        neonPurple: '#b026ff',
                        tealHigh: '#00f0ff',
                    },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-deep text-white min-h-screen relative font-sans overflow-x-hidden pb-24">
    <div class="fixed top-[-20%] right-[-10%] w-72 h-72 bg-neonPurple rounded-full mix-blend-screen filter blur-[120px] opacity-20 z-0 pointer-events-none"></div>
    <div class="fixed bottom-[20%] left-[-10%] w-60 h-60 bg-tealHigh rounded-full mix-blend-screen filter blur-[100px] opacity-20 z-0 pointer-events-none"></div>

    <div class="relative z-10 px-6 pt-10">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 animate-fade-in-up">
            <div>
                <p class="text-sm text-gray-400">Welcome back,</p>
                <h1 class="text-2xl font-bold" id="studentName">Student</h1>
                <p class="text-xs text-neonPurple mt-1" id="studentBranch">Branch</p>
            </div>
            <div class="relative" onclick="window.api.logout()">
                <img id="profileImg" src="" alt="Profile" class="w-12 h-12 rounded-full border-2 border-neonPurple/50 shadow-[0_0_15px_rgba(176,38,255,0.3)]">
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-deep"></div>
            </div>
        </header>

        <!-- Summary Widget -->
        <div class="glass-card rounded-2xl p-5 mb-6 animate-fade-in-up" style="animation-delay: 0.1s;">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-gray-400 text-xs mb-1">Current CGPA</p>
                    <h2 class="text-3xl font-bold text-gradient" id="studentCGPA">0.0</h2>
                </div>
                <div class="h-12 w-[1px] bg-white/10"></div>
                <div>
                    <p class="text-gray-400 text-xs mb-1">Overall Attendance</p>
                    <h2 class="text-3xl font-bold text-white flex items-baseline gap-1" id="overallAttendance">0<span class="text-sm text-gray-400">%</span></h2>
                </div>
            </div>
        </div>

        <!-- Quick Actions Grid -->
        <h3 class="text-lg font-semibold mb-4 animate-fade-in-up" style="animation-delay: 0.2s;">Quick Overview</h3>
        <div class="grid grid-cols-2 gap-4 mb-6 animate-fade-in-up" style="animation-delay: 0.3s;">
            <a href="subjects.html" class="glass-card rounded-xl p-4 flex flex-col gap-3 active:scale-95 transition-transform cursor-pointer block">
                <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-500">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <div>
                    <p class="font-medium text-sm">Subjects</p>
                    <p class="text-xs text-gray-400">Semester View</p>
                </div>
            </a>
            <a href="attendance.html" class="glass-card rounded-xl p-4 flex flex-col gap-3 active:scale-95 transition-transform cursor-pointer block">
                <div class="w-8 h-8 rounded-full bg-tealHigh/20 flex items-center justify-center text-tealHigh">
                    <i class="fa-solid fa-chart-pie"></i>
                </div>
                <div>
                    <p class="font-medium text-sm">Prediction</p>
                    <p class="text-xs text-gray-400">View Status</p>
                </div>
            </a>
            <a href="timetable.html" class="glass-card rounded-xl p-4 flex flex-col gap-3 active:scale-95 transition-transform cursor-pointer block">
                <div class="w-8 h-8 rounded-full bg-orange-500/20 flex items-center justify-center text-orange-500">
                    <i class="fa-regular fa-calendar"></i>
                </div>
                <div>
                    <p class="font-medium text-sm">Date Sheet</p>
                    <p class="text-xs text-gray-400">Classes & MSTs</p>
                </div>
            </a>
            <div class="glass-card rounded-xl p-4 flex flex-col gap-3 active:scale-95 transition-transform cursor-pointer">
                <div class="w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center text-red-500">
                    <i class="fa-solid fa-file-invoice"></i>
                </div>
                <div>
                    <p class="font-medium text-sm">Leaves</p>
                    <p class="text-xs text-gray-400">Apply & Status</p>
                </div>
            </div>
        </div>

        <!-- Live Class Card -->
        <h3 class="text-lg font-semibold mb-4 animate-fade-in-up" style="animation-delay: 0.4s;">Next Live Class</h3>
        <div class="glass-card rounded-2xl p-5 relative overflow-hidden animate-fade-in-up" style="animation-delay: 0.5s;">
            <div class="absolute top-0 left-0 w-1 h-full bg-tealHigh shadow-[0_0_10px_#00f0ff]"></div>
            <div class="flex justify-between items-start mb-3 ml-2">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="w-2 h-2 rounded-full bg-tealHigh animate-pulse"></span>
                        <span class="text-xs font-medium text-tealHigh uppercase tracking-wider">Live Now</span>
                    </div>
                    <h4 class="text-lg font-bold" id="liveSubject">Loading...</h4>
                </div>
                <div class="bg-white/10 px-3 py-1 rounded-full text-xs border border-white/5" id="liveTime">
                    --:--
                </div>
            </div>
            <div class="ml-2 flex flex-col gap-2 mt-4 text-sm text-gray-300">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-user-tie w-4 text-center text-gray-500"></i>
                    <span id="liveProf">--</span>
                </div>
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-location-dot w-4 text-center text-gray-500"></i>
                    <span id="liveRoom">--</span>
                </div>
            </div>
        </div>

        <!-- Subjects List Snippet -->
        <h3 class="text-lg font-semibold mb-4 mt-6 animate-fade-in-up" style="animation-delay: 0.6s;">My Subjects</h3>
        <div id="subjects" class="flex flex-col gap-3 animate-fade-in-up" style="animation-delay: 0.7s;">
            <!-- Populated entirely by JS real data -->
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const isDemo = localStorage.getItem('demoMode') === 'true';
            
            let data;
            if(isDemo) {
                 // Format data.js correctly to mimic API response structure
                 data = { 
                     student: window.appData.student, 
                     attendance: window.appData.attendance 
                 };
            } else {
                 try {
                     data = await window.api.getDashboard();
                 } catch(e) {
                     console.error("Dashboard api failed, defaulting to local data", e);
                     data = { student: window.appData.student, attendance: window.appData.attendance };
                 }
            }
            
            // Populate student
            document.getElementById('studentName').textContent = data.student.name;
            document.getElementById('studentBranch').textContent = data.student.branch + ' • Sem ' + data.student.semester;
            document.getElementById('studentCGPA').textContent = data.student.cgpa;
            if(data.student.profileImg) document.getElementById('profileImg').src = data.student.profileImg;
            
            // Attendance
            document.getElementById('overallAttendance').innerHTML = `${data.attendance.overall}<span class="text-sm text-gray-400">%</span>`;
            
            // Live Class Check (Simulated for Demo based on current day)
            // Hardcoding Devops as per prompt explicitly requiring DevOps live card
            document.getElementById('liveSubject').textContent = "DevOps Lab";
            document.getElementById('liveTime').textContent = "09:30 - 10:20";
            document.getElementById('liveProf').textContent = "Pf. Himani Sharma";
            document.getElementById('liveRoom').textContent = "PL Lab";

            // Render subjects directly on Dashboard (from data.js snippet)
            const subjectsList = document.getElementById("subjects");
            if(subjectsList && window.appData && window.appData.subjects) {
                window.appData.subjects.forEach(subject => {
                   const card = document.createElement("div");
                   card.className = "glass-card rounded-xl p-4 transition-transform active:scale-95";
                   card.innerHTML = `
                   <h3 class="text-[15px] font-bold text-white mb-1 leading-tight">${subject.name}</h3>
                   <p class="text-xs text-gray-400 flex items-center gap-2"><i class="fa-solid fa-user-tie"></i> ${subject.professor}</p>
                   `;
                   subjectsList.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
