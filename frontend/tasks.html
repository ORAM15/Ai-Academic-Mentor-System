<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goals - Virtual Mentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: '#0a0a0a',
                        purpleDark: '#110a1f',
                        neonPurple: '#b026ff',
                        tealHigh: '#00f0ff',
                    },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-deep text-white min-h-screen relative font-sans overflow-x-hidden pb-24">
    <div class="fixed top-[10%] left-[-10%] w-60 h-60 bg-neonPurple rounded-full mix-blend-screen filter blur-[120px] opacity-20 z-0 pointer-events-none"></div>

    <div class="relative z-10 px-6 pt-10 flex flex-col h-full">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8 shrink-0">
            <h1 class="text-xl font-bold tracking-wide">Goal Tracking</h1>
            <div class="bg-white/10 px-3 py-1 rounded-full text-xs border border-white/5 flex items-center gap-2">
                <span id="progressText" class="font-bold text-tealHigh">0%</span> Done
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="w-full bg-white/5 h-3 rounded-full overflow-hidden mb-6 border border-white/10 animate-fade-in-up">
            <div id="progressBar" class="h-full bg-gradient-to-r from-neonPurple to-tealHigh rounded-full shadow-[0_0_10px_rgba(176,38,255,0.4)] transition-all duration-1000 ease-out" style="width: 0%;"></div>
        </div>

        <div id="tasksContainer" class="flex-1 overflow-y-auto hide-scrollbar flex flex-col gap-4 pb-4 animate-fade-in-up" style="animation-delay: 0.2s;">
            <div class="text-center text-gray-400 py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i> Loading...</div>
        </div>

        <!-- Add Goal CTA -->
        <button onclick="openAddTaskModal()" class="mt-4 w-full bg-white/5 border border-white/20 border-dashed rounded-xl p-4 text-center text-gray-400 hover:text-white transition-colors flex items-center justify-center gap-2 active:scale-95">
            <i class="fa-solid fa-plus text-xl"></i> Add New Goal
        </button>
    </div>

    <!-- Add Task Modal -->
    <div id="taskModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="glass-card rounded-2xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold">Add New Goal</h2>
                <button onclick="closeAddTaskModal()" class="text-gray-400 hover:text-white">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <form id="addTaskForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-2">Goal Title</label>
                    <input type="text" id="taskTitle" placeholder="e.g., Complete MEAN Assignment" class="w-full bg-white/5 border border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-neonPurple/50 text-white placeholder-gray-600" required>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-2">Goal Type</label>
                    <select id="taskType" class="w-full bg-white/5 border border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-neonPurple/50 text-white">
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="deadline">Deadline</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeAddTaskModal()" class="flex-1 bg-white/5 border border-white/10 rounded-lg py-2 px-4 text-sm font-medium hover:bg-white/10 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" class="flex-1 bg-gradient-to-r from-neonPurple to-indigo-600 rounded-lg py-2 px-4 text-sm font-medium hover:shadow-[0_0_15px_rgba(176,38,255,0.4)] transition-all">
                        Add Goal
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        function openAddTaskModal() {
            document.getElementById('taskModal').classList.remove('hidden');
            document.getElementById('taskTitle').focus();
        }

        function closeAddTaskModal() {
            document.getElementById('taskModal').classList.add('hidden');
            document.getElementById('addTaskForm').reset();
        }

        // Close modal when clicking outside
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('taskModal').addEventListener('click', (e) => {
                if(e.target.id === 'taskModal') closeAddTaskModal();
            });
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const isDemo = localStorage.getItem('demoMode') === 'true';
            let tasks = [];

            try {
                if(isDemo) throw "Demo Mode active";
                tasks = await window.api.getTasks();
            } catch(e) {
                // Fallback demo tasks
                tasks = [
                    { id: 1, title: "Complete MEAN Assignment 2", type: "deadline", completed: false },
                    { id: 2, title: "Read DevOps Docker module", type: "weekly", completed: false },
                    { id: 3, title: "Attend IML extra class", type: "daily", completed: true },
                    { id: 4, title: "Review DAA MST-1 Syllabus", type: "weekly", completed: true }
                ];
                // Load from localStorage if available
                const savedTasks = localStorage.getItem('demoTasks');
                if(savedTasks) {
                    try {
                        tasks = JSON.parse(savedTasks);
                    } catch(e) {
                        console.log("Could not parse saved tasks");
                    }
                }
            }

            function saveTasks() {
                if(isDemo) {
                    localStorage.setItem('demoTasks', JSON.stringify(tasks));
                }
            }

            function renderTasks() {
                const container = document.getElementById('tasksContainer');
                container.innerHTML = '';
                
                if(tasks.length === 0) {
                     container.innerHTML = '<p class="text-gray-500 text-center text-sm py-10">No goals set yet.</p>';
                     return;
                }

                let completedCount = 0;

                tasks.forEach((task, index) => {
                    if(task.completed) completedCount++;

                    let icon = 'fa-calendar-day';
                    let colorClass = 'text-blue-400';
                    if(task.type === 'weekly') { icon = 'fa-calendar-week'; colorClass = 'text-neonPurple'; }
                    if(task.type === 'deadline') { icon = 'fa-stopwatch'; colorClass = 'text-red-400'; }

                    container.innerHTML += `
                    <div class="glass-card rounded-xl p-4 flex items-center justify-between gap-3 active:scale-95 transition-transform ${task.completed ? 'opacity-50' : ''}">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center bg-white/5 border border-white/10 shrink-0 ${colorClass}">
                                <i class="fa-solid ${icon}"></i>
                            </div>
                            <div class="truncate">
                                <h4 class="text-sm font-semibold truncate ${task.completed ? 'line-through text-gray-400' : 'text-white'}">${task.title}</h4>
                                <p class="text-[10px] text-gray-500 uppercase tracking-wider mt-0.5">${task.type}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button class="w-6 h-6 rounded-full border border-white/20 flex items-center justify-center ${task.completed ? 'bg-tealHigh text-deep border-tealHigh' : 'bg-transparent text-transparent hover:border-tealHigh hover:text-tealHigh'} transition-all" onclick="toggleTask(${index})">
                                <i class="fa-solid fa-check text-[10px]"></i>
                            </button>
                            <button class="w-6 h-6 rounded-full border border-white/20 flex items-center justify-center text-red-400/50 hover:text-red-400 hover:border-red-400 transition-all" onclick="deleteTask(${index})">
                                <i class="fa-solid fa-trash text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                    `;
                });

                const percentage = tasks.length > 0 ? Math.round((completedCount / tasks.length) * 100) : 0;
                document.getElementById('progressText').textContent = `${percentage}%`;
                setTimeout(() => {
                     document.getElementById('progressBar').style.width = `${percentage}%`;
                }, 300);
            }

            window.toggleTask = (index) => {
                tasks[index].completed = !tasks[index].completed;
                saveTasks();
                renderTasks();
            };

            window.deleteTask = (index) => {
                if(confirm('Delete this goal?')) {
                    tasks.splice(index, 1);
                    saveTasks();
                    renderTasks();
                }
            };

            // Initial render
            renderTasks();

            // Handle form submission
            document.getElementById('addTaskForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const title = document.getElementById('taskTitle').value.trim();
                const type = document.getElementById('taskType').value;

                if(!title) return;

                const newTask = {
                    id: tasks.length > 0 ? Math.max(...tasks.map(t => t.id || 0)) + 1 : 1,
                    title: title,
                    type: type,
                    completed: false
                };

                tasks.push(newTask);
                saveTasks();
                renderTasks();
                closeAddTaskModal();
            });
        });
    </script>
</body>
</html>
