<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Mentor - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: '#0a0a0a',
                        neonPurple: '#b026ff',
                        tealHigh: '#00f0ff',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-deep text-white min-h-screen flex items-center justify-center relative overflow-hidden font-sans">
    <div class="glass-card w-[90%] max-w-md p-8 rounded-3xl z-10">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight">Register</h1>
            <p class="text-sm text-gray-400 mt-1">Create your account</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <p id="errorMsg" class="text-red-500 text-xs text-center hidden mb-2"></p>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 ml-1">Student ID</label>
                <input type="text" id="studentId" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-neonPurple/50 focus:border-transparent transition-all placeholder-gray-600" placeholder="e.g. 2100000" required>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 ml-1">Full Name</label>
                <input type="text" id="fullName" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-neonPurple/50 focus:border-transparent transition-all placeholder-gray-600" placeholder="Your full name" required>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 ml-1">Password</label>
                <input type="password" id="password" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-neonPurple/50 focus:border-transparent transition-all placeholder-gray-600" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submitBtn" class="w-full relative group overflow-hidden rounded-xl bg-gradient-to-r from-neonPurple to-indigo-600 text-white font-medium py-3 shadow-[0_4px_15px_rgba(176,38,255,0.4)] transition-all hover:shadow-[0_4px_25px_rgba(176,38,255,0.6)] hover:scale-[1.02]">
                <span class="relative flex items-center justify-center gap-2">
                    Register <i class="fa-solid fa-user-plus text-xs"></i>
                </span>
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            Already have an account? <a href="login.html" class="text-neonPurple hover:text-tealHigh">Login</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sid = document.getElementById('studentId').value;
            const name = document.getElementById('fullName').value;
            const pwd = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMsg');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registering...';

            try {
                await window.api.register(sid, name, pwd);
                alert('Registration successful! Please login.');
                window.location.href = 'login.html';
            } catch(e) {
                err.textContent = e.message || 'Registration failed. Please try again.';
                err.classList.remove('hidden');
                btn.innerHTML = '<span class="relative flex items-center justify-center gap-2">Register <i class="fa-solid fa-user-plus text-xs"></i></span>';
            }
        });
    </script>
</body>
</html>
