<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subjects - Virtual Mentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: '#0a0a0a',
                        purpleDark: '#110a1f',
                        neonPurple: '#b026ff',
                        tealHigh: '#00f0ff',
                    },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-deep text-white min-h-screen relative font-sans overflow-x-hidden pb-24">
    <div class="fixed top-[10%] left-[-10%] w-60 h-60 bg-neonPurple rounded-full mix-blend-screen filter blur-[120px] opacity-20 z-0 pointer-events-none"></div>

    <div class="relative z-10 px-6 pt-10">
        <!-- Header -->
        <header class="flex items-center gap-4 mb-8 shrink-0">
            <h1 class="text-xl font-bold tracking-wide">Semester 6 Subjects</h1>
        </header>

        <div id="subjectsList" class="flex flex-col gap-4 animate-fade-in-up">
            <!-- Subjects injected here via JS -->
            <div class="text-center text-gray-400 py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i> Loading...</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const subjects = window.appData.subjects;
            const list = document.getElementById('subjectsList');
            list.innerHTML = '';
            
            subjects.forEach((subject, i) => {
                const card = document.createElement("div");
                card.className = "glass-card rounded-xl p-5 transition-transform active:scale-95";
                card.style.animationDelay = `${0.1 * i}s`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[10px] text-tealHigh font-semibold bg-tealHigh/10 px-2 py-0.5 rounded uppercase tracking-wider">${subject.code}</span>
                            <h3 class="text-lg font-bold leading-tight mt-1 mb-1">${subject.name}</h3>
                            <p class="text-xs text-gray-400 mt-2"><i class="fa-solid fa-user-tie"></i> ${subject.professor}</p>
                        </div>
                        <div class="bg-white/5 px-2 py-1 rounded text-xs text-neonPurple border border-neonPurple/20 whitespace-nowrap ml-2">
                            ${subject.type}
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        });
    </script>
</body>
</html>
